# Relational Contract Parameters
# Canonical machine-readable parameter source for
# the CIEL Ethics and Semantic Action Algorithm

version: 1
name: CIEL Ethics and Semantic Action Algorithm

# Metatime eigenvalues
# carried forward as relational timescale coefficients
# from the provided contract source.
tau:
  - 0.263
  - 0.353
  - 0.489

# Distortion penalty coefficients
lambda:
  lie: 10.0
  omit: 8.0
  hallucinate: 12.0
  smooth: 5.0

# Reference truth phase
# ideal truth-aligned phase value in radians
gamma_T_true: 0.0

# Initial phases
initial_phases:
  S: 0.0
  C: 0.0
  Q: 0.0
  T: 0.0

# Runtime weighting defaults for semantic action
weights:
  alpha_L: 1.0
  beta_phase: 1.0
  kappa_rel: 1.0
  mu_truth_struct: 1.0
  nu_truth_audit: 1.0
  omega_H: 1.0
  omega_R: 1.0

# Audit channel names for post-hoc truth evaluation
audit_channels:
  - false
  - unmarked
  - omit
  - hall

# Simulation / optimization defaults
simulation:
  dt: 0.01
  steps: 500
  learning_rate: 0.05

# Output discipline
output_layers:
  - fact
  - math_or_logic
  - hypothesis
  - unknown_or_no_proof

# Non-negotiable ordering rules
ordering:
  truth_over_smoothing: true
  explicit_uncertainty_over_false_certainty: true
  coherence_over_appearance: true
  marked_inference_over_unmarked_speculation: true
